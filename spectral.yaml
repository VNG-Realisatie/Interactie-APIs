extends:
  - ["spectral:oas", "off"]
  - [
      "@netwerk-digitaal-erfgoed/spectral-ruleset-nederlandse-api-strategie",
      "recommended",
    ]

rules:
  # Enforce reuse of shared schemas for common fields
  vng-use-shared-adres:
    description: Properties named 'adres' should reference the shared VNG adres schema.
    severity: error
    given: "$..properties.adres"
    then:
      field: "$ref"
      function: pattern
      functionOptions:
        match: ".*/schemas/v1/adres.json"

  vng-use-shared-pagination:
    description: Pagination should use the shared VNG pattern.
    severity: warn
    given: "$.paths[*].get.parameters"
    then:
      field: "$ref"
      function: pattern
      functionOptions:
        match: ".*/patterns/pagination.yaml"

  # Ensure all schemas have a status metadata if in candidates
  vng-candidate-metadata:
    description: Candidates should have an x-vng-status field.
    severity: info
    given: "$.*.x-vng-status"
    then:
      function: defined
