servers:
  - url: http://127.0.0.1:4010/apis/events/zaakchat/v1
    description: Local development server for ZaakChat

paths:
  /events:
    get:
      summary: Establish an SSE connection for real-time events
      description: |
        Connect to this endpoint to receive a continuous stream of ZaakChat events.

        The stream uses the `text/event-stream` format. Each event in the stream follows the CloudEvent 1.0 specification.
      operationId: subscribeToEvents
      responses:
        "200":
          description: A successful SSE connection. Returns a stream of events.
          content:
            text/event-stream:
              schema:
                $ref: "../../../schemas/events/v0.0.1.json#/$defs/CloudEvent"
              examples:
                IssueCreated:
                  summary: New municipal case created
                  value: |
                    event: message
                    data: {
                      "specversion": "1.0",
                      "type": "json.commit",
                      "source": "zaakchat-service",
                      "subject": "1",
                      "id": "01HF7K8QZ9X1Y2Z3A4B5C6D7E8",
                      "time": "2025-01-15T10:30:00Z",
                      "datacontenttype": "application/json",
                      "data": {
                        "resource_id": "1",
                        "schema": "Issue",
                        "actor": "user@gemeente.nl",
                        "timestamp": "2025-01-15T10:30:00Z",
                        "resource_data": {
                          "id": "1",
                          "title": "Paspoort aanvragen",
                          "description": "Nieuwe paspoort aanvraag ingediend door burger",
                          "status": "open",
                          "assignee": "alice@gemeente.nl"
                        }
                      }
                    }
                CommentAdded:
                  summary: New comment added to a case
                  value: |
                    event: message
                    data: {
                      "specversion": "1.0",
                      "type": "json.commit",
                      "source": "zaakchat-service",
                      "subject": "1",
                      "id": "01HF7K8QZ9X1Y2Z3A4B5C6D7E9",
                      "time": "2025-01-15T10:35:00Z",
                      "datacontenttype": "application/json",
                      "data": {
                        "resource_id": "comment-123",
                        "schema": "Comment",
                        "actor": "burger@eindhoven.nl",
                        "timestamp": "2025-01-15T10:35:00Z",
                        "resource_data": {
                          "content": "Wanneer kan ik mijn paspoort ophalen?"
                        }
                      }
                    }

components:
  schemas:
    CloudEvent:
      $ref: "../../../schemas/events/v0.0.1.json#/$defs/CloudEvent"
    JSONCommit:
      $ref: "../../../schemas/events/v0.0.1.json#/$defs/JSONCommit"
    Issue:
      $ref: "../../../schemas/zaakchat/v0.0.1.json#/$defs/Issue"
    Comment:
      $ref: "../../../schemas/zaakchat/v0.0.1.json#/$defs/Comment"
    Task:
      $ref: "../../../schemas/zaakchat/v0.0.1.json#/$defs/Task"
    Document:
      $ref: "../../../schemas/zaakchat/v0.0.1.json#/$defs/Document"
    Planning:
      $ref: "../../../schemas/zaakchat/v0.0.1.json#/$defs/Planning"
