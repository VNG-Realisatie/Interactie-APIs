openapi: 3.2.0
jsonSchemaDialect: https://spec.openapis.org/oas/3.1/dialect/base
info:
  title: Afspraken API - Detailschema's
  version: 0.1.0-concept
components:
  schemas:
    AfspraakDetails:
      type: object
      required:
        - afspraakIdentificatie
      description: |
        Volledige details van één afspraak.

        **Conceptversie** — het datamodel is nog in ontwikkeling. Alleen `afspraakIdentificatie`
        is hard vastgesteld. Alle overige velden zijn voorlopig en kunnen wijzigen.
      x-source-note: >
        Het datamodel is nog in ontwikkeling. Alleen afspraakIdentificatie is definitief
        vastgesteld; overige velden blijven voorlopig.
      properties:
        afspraakIdentificatie:
          type: string
          description: |
            Unieke identificatie van de agenda-afspraak, toegekend door het afsprakensysteem.
            De waarde is opaque.
          example: "afspr-2026-001-xyz"
        onderwerp:
          type: string
          x-provisional: true
          description: |
            **Voorlopig veld** — nog niet definitief vastgesteld.
            Het onderwerp van de afspraak.
          example: "Gesprek re-integratie"
        geplandAanvangsmoment:
          type: string
          format: date-time
          x-provisional: true
          description: |
            **Voorlopig veld** — nog niet definitief vastgesteld.
            Het geplande aanvangsmoment van de afspraak als ISO 8601 datetime met timezone offset.
            Voorbeeld: `2026-03-15T09:00:00+01:00`.
          example: "2026-03-15T09:00:00+01:00"
        geplandEindmoment:
          type: string
          format: date-time
          x-provisional: true
          description: |
            **Voorlopig veld** — nog niet definitief vastgesteld.
            Het geplande eindmoment van de afspraak als ISO 8601 datetime met timezone offset.
          example: "2026-03-15T10:00:00+01:00"
        locatie:
          x-provisional: true
          description: |
            **Voorlopig veld** — nog niet definitief vastgesteld.
            Locatie van de afspraak. Kan fysiek, telefonisch of online zijn.
          allOf:
            - $ref: '#/components/schemas/AfspraakLocatie'
        aanduidingWatMeeTeNemen:
          type: array
          x-provisional: true
          description: |
            **Voorlopig veld** — nog niet definitief vastgesteld.
            Lijst van documenten of items die de inwoner moet meenemen naar de afspraak.
          items:
            type: string
          example:
            - "Geldig identiteitsbewijs"
            - "Laatste loonstrook"
    AfspraakLocatie:
      type: object
      x-provisional: true
      description: |
        **Voorlopig schema** — nog niet definitief vastgesteld.

        Locatiegegevens van een afspraak. De bron beschrijft fysieke, telefonische en
        online/video-afspraken; het model is hierop uitbreidbaar.
      properties:
        type:
          type: string
          x-provisional: true
          description: |
            **Voorlopig** — type locatie of modaliteit van de afspraak.
          enum:
            - fysiek
            - telefonisch
            - video
            - onbekend
          example: fysiek
        naam:
          type: string
          description: Naam van de locatie.
          example: "Stadskantoor Rotterdam, ingang Coolsingel"
        bezoekadres:
          x-provisional: true
          description: |
            **Voorlopig** — bezoekadres waar de fysieke afspraak plaatsvindt.
          allOf:
            - $ref: '#/components/schemas/Adres'

    Adres:
      type: object
      x-provisional: true
      description: |
        **Voorlopig schema** — adresmodel conform het informatiemodel, opgebouwd uit
        één tot drie adresregels en optioneel een land.
      properties:
        adresregel1:
          type: string
          description: Eerste adresregel.
          example: "Coolsingel 40"
        adresregel2:
          type: string
          description: Tweede adresregel.
          example: "3011 AD Rotterdam"
        adresregel3:
          type: string
          description: Derde adresregel, indien van toepassing.
          example: "Gebouw C, kamer 204"
        land:
          type: string
          description: Land van het bezoekadres, indien relevant.
          example: "Nederland"
