        - name: aanvangsmomentGesprek__gte
          in: query
          description: Filter op aanvangsmoment (groter dan of gelijk aan).
          schema:
            type: string
            format: date-time
        - name: aanvangsmomentGesprek__lte
          in: query
          description: Filter op aanvangsmoment (kleiner dan of gelijk aan).
          schema:
            type: string
            format: date-time
      responses:
        "200":
          description: OK
          headers:
            X-Total-Count:
              $ref: "#/components/headers/XTotalCount"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GesprekList"
        "400":
          $ref: "#/components/responses/400"
        "401":
          $ref: "#/components/responses/401"
        "403":
          $ref: "#/components/responses/403"
        "500":
          $ref: "#/components/responses/500"
      security:
        - bearerAuth: []

    post:
      operationId: gesprekken_create
      summary: Gesprek aanmaken
      description: Maakt een nieuw gesprek aan.
      tags:
        - Gesprekken
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/GesprekCreate"
      responses:
