openapi: 3.0.3

info:
  title: Gesprekken
  description: |
    API voor het registreren en raadplegen van gesprekken tussen klanten en de gemeente.

    Een **Gesprek** is een dialoog, met een aanleiding, tussen een klant van een gemeente,
    de gemeente en eventuele andere betrokkenen. Het gesprek bevat één of meer
    **Gespreksbijdragen** (wat een deelnemer toevoegt aan het gesprek), geleverd door
    **Gespreksdeelnemers**.

    Dit informatiemodel omvat:
    - `GESPREK` — de geregistreerde dialoog
    - `GESPREKSBIJDRAGE` — een bijdrage c.q. bericht van een deelnemer
    - `GESPREKSDEELNEMER` — een abstracte deelnemer aan een gesprek (Partij of Actor)
    - `GESPREKSDEELNAME` — de registratie van deelname van een deelnemer aan een gesprek
    - `GELEZEN GESPREKSBIJDRAGE` — de registratie dat een bijdrage gelezen is

    Versie: next (ontwikkeling)
  version: "next"
  contact:
    name: VNG Realisatie
  license:
    name: EUPL 1.2

servers:
  - url: /api/v1
    description: Productie

tags:
  - name: Gesprekken
    description: Operaties op gespreksresources.
  - name: Gespreksbijdragen
    description: Operaties op bijdragen binnen gesprekken.
  - name: Gespreksdeelnemers
    description: Operaties op deelnemers van gesprekken.
  - name: Gespreksdeelnames
    description: Operaties op deelname-gegevens (wie neemt wanneer deel).
  - name: GelezenGespreksbijdragen
    description: Operaties op leesstatus van gespreksbijdragen.

