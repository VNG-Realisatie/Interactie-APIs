servers:
  - url: http://127.0.0.1:4010/apis/streams/zaakchat/v1
    description: Local development server for ZaakChat

tags:
  - name: Events
    description: Real-time event streams

paths:
  /events:
    get:
      summary: Establish an SSE connection for real-time events
      tags:
        - Events
      description: |
        Connect to this endpoint to receive a continuous stream of ZaakChat events, scoped to the user's identity.

        The stream uses the `text/event-stream` format. Each event in the stream follows the CloudEvent 1.0 specification.
      operationId: subscribeToEvents
      responses:
        "200":
          description: A successful SSE connection. Returns a stream of events.
          content:
            text/event-stream:
              schema:
                $ref: "../../../schemas/events/v0.0.1.json#/$defs/CloudEvent"

components:
  schemas: {}
