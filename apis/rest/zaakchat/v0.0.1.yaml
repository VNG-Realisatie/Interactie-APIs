openapi: 3.1.0
info:
  title: Events
  version: 0.0.1
  description: |
    # Events API (SSE)

    This API provides a real-time stream of events for ZaakChat using **Server-Sent Events (SSE)**. It allows clients to stay synchronized with the state of municipal cases (Zaken), comments, tasks, and documents without polling.

    ## Protocol: Server-Sent Events
    The `/events` endpoint is a long-running HTTP GET request that returns a stream of events (`text/event-stream`).

    - **Persistent Connection**: Clients should establish a connection and keep it open.
    - **Automatic Reconnection**: Standard SSE clients (like the browser's `EventSource`) automatically reconnect if the connection is dropped.
    - **Event Format**: Each event is a JSON-encoded **CloudEvent 1.0** containing a **JSONCommit**.

    ## Data Pattern: Delta Snapshot
    The Event API follows a *delta-snapshot* pattern designed for efficient synchronization and conflict resolution.

    1. **Snapshots**: When a client first connects (or after a long disconnect), it should typically fetch the current state (the snapshot) via the REST API.
    2. **Deltas**: The Event API then delivers "deltas" (JSONCommits) that describe changes to that state.
    3. **JSONCommit**: Each commit contains:
        - `resource_id`: The ID of the resource being changed.
        - `schema`: The type of resource (Issue, Comment, etc.).
        - `resource_data`: The full resource state (for new resources).
        - `patch`: A JSON Merge Patch (RFC 7396) containing only the changed fields (for updates).
        - `deleted`: A boolean flag (for deletions).

    Clients should apply these patches to their local state to stay updated.

  contact:
    name: VNG Realisatie
    url: https://www.vngrealisatie.nl
