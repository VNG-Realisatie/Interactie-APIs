openapi: 3.1.0
info:
  title: Demo API (Voorbeeld)
  version: 1.0.0
  description: Een voorbeeld API die gebruik maakt van gedeelde schemas en patronen.

servers:
  - url: http://127.0.0.1:4010/apis/rest/demo/v1
    description: Lokale Mock Server (Gateway)
  - url: https://vng-realisatie.github.io/vng-apis-schemas/apis/rest/demo/v1
    description: Productie (GitHub Pages)

paths:
  /zaken:
    get:
      summary: Lijst met zaken
      parameters:
        - $ref: "#/components/parameters/Page"
        - $ref: "#/components/parameters/PageSize"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Zaak"

components:
  parameters:
    Page:
      name: page
      in: query
      description: Het paginanummer dat moet worden opgehaald.
      schema:
        type: integer
        default: 1
    PageSize:
      name: pageSize
      in: query
      description: Het aantal items per pagina.
      schema:
        type: integer
        default: 20
        maximum: 100
  schemas:
    Zaak:
      $ref: "../../../schemas/zaak/v0.0.1.json"
