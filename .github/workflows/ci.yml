name: Validate APIs & Schemas

on:
  push:
    branches:
      - main
      - "**"
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Spectral
        run: npm install -g @stoplight/spectral-cli

      - name: Run Spectral Linting
        run: spectral lint --fail-severity=error "apis/**/*.yaml" "apis/**/*.yml" "patterns/**/*.yaml" "patterns/**/*.yml"

  validate-asyncapi:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Detect AsyncAPI files
        id: asyncapi-files
        shell: bash
        run: |
          files=$(grep -R -l '^asyncapi:' apis --include='*.yaml' --include='*.yml' || true)
          {
            echo 'files<<EOF'
            echo "$files"
            echo 'EOF'
          } >> "$GITHUB_OUTPUT"

      - name: Validate AsyncAPI
        if: steps.asyncapi-files.outputs.files != ''
        shell: bash
        run: |
          npm install -g @asyncapi/cli
          while IFS= read -r file; do
            [ -n "$file" ] || continue
            asyncapi validate "$file"
          done <<< "${{ steps.asyncapi-files.outputs.files }}"

      - name: Skip AsyncAPI validation
        if: steps.asyncapi-files.outputs.files == ''
        run: echo "No AsyncAPI files found under apis/, skipping validation."

  build-docs:
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: Build Scalar Portal
        run: |
          # Dit is een placeholder voor de Scalar CLI builder
          # In een echte setup zouden we hier voor elke API in `apis/` een HTML bestand genereren
          mkdir -p public
          echo "<h1>VNG API Portal Placeholder</h1>" > public/index.html

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./public
